schema_version: 1
kind: credentials_registry
catalog_scope: partner_subset
profile: telegram-mcp-standalone
count: 8
entries:
- id: lisa_tg_api_key
  name: Lisa Telegram API ID
  source: keychain
  key: lisa_tg_api_key
  backend_options:
    account: lisa
  fallback_sources:
  - env
  - github_secrets
  validation_rules:
    type: int
    min_length: 1
  env_aliases:
  - LISA_TG_API_KEY
  - TELEGRAM_API_ID
- id: lisa_tg_app_hash
  name: Lisa Telegram API Hash
  source: keychain
  key: lisa_tg_app_hash
  backend_options:
    account: lisa
  fallback_sources:
  - env
  - github_secrets
  validation_rules:
    type: str
    min_length: 32
  env_aliases:
  - LISA_TG_APP_HASH
  - TELEGRAM_API_HASH
- id: lisa_tg_session
  name: Lisa Telegram Session String
  source: keychain
  key: lisa_tg_session
  backend_options:
    account: lisa
  fallback_sources:
  - env
  - github_secrets
  validation_rules:
    type: str
    min_length: 10
  env_aliases:
  - LISA_TG_SESSION
  - TELEGRAM_SESSION_STRING
- id: supabase_rick_api_key
  name: Supabase Rick.ai API Key
  source: keychain
  key: supabase_rick_api_key
  fallback_sources:
  - env
  - github_secrets
  validation_rules:
    type: str
    min_length: 100
    prefix: eyJ
  env_aliases:
  - SUPABASE_RICK_API_KEY
  - SUPABASE_API_KEY
- id: supabase_rick_db_url
  name: Supabase Rick.ai DB URL
  source: keychain
  key: supabase_rickai_db_url
  fallback_sources:
  - env
  validation_rules:
    type: str
    min_length: 50
  env_aliases:
  - SUPABASE_RICKAI_DB_URL
  - SUPABASE_RICK_DB_URL
  - SUPABASE_DB_URL
- id: telegram_api_hash
  name: Telegram API Hash
  source: keychain
  key: telegram_api_hash
  fallback_sources:
  - env
  - github_secrets
  validation_rules:
    type: str
    min_length: 32
  env_aliases:
  - TELEGRAM_API_HASH
- id: telegram_api_id
  name: Telegram API ID
  source: bitwarden_cloud
  key: telegram_api_id
  fallback_sources:
  - keychain
  - env
  - github_secrets
  validation_rules:
    type: int
    min_length: 1
  env_aliases:
  - TELEGRAM_API_ID
- id: telegram_session
  name: Telegram Session String
  source: keychain
  key: telegram_session
  fallback_sources:
  - env
  - github_secrets
  validation_rules:
    type: str
    min_length: 10
  env_aliases:
  - TELEGRAM_SESSION
  - TELEGRAM_SESSION_STRING
