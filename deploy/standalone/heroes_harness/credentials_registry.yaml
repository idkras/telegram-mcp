schema_version: 1
kind: credentials_registry
catalog_scope: partner_subset
credentials:
  - key: telegram_api_id
    source: env
    env_aliases: [TELEGRAM_API_ID]
  - key: telegram_api_hash
    source: env
    env_aliases: [TELEGRAM_API_HASH]
  - key: telegram_session
    source: env
    env_aliases: [TELEGRAM_SESSION_STRING]
  - key: ik_tg_api_id
    source: env
    env_aliases: [TELEGRAM_API_ID]
  - key: ik_tg_api_hash
    source: env
    env_aliases: [TELEGRAM_API_HASH]
  - key: ik_tg_session
    source: env
    env_aliases: [TELEGRAM_SESSION_STRING]
  - key: lisa_tg_api_key
    source: env
    env_aliases: [TELEGRAM_API_ID]
  - key: lisa_tg_app_hash
    source: env
    env_aliases: [TELEGRAM_API_HASH]
  - key: lisa_tg_session
    source: env
    env_aliases: [TELEGRAM_SESSION_STRING]
  - key: supabase_rick_db_url
    source: env
    env_aliases: [SUPABASE_DB_URL]
  - key: supabase_rick_api_key
    source: env
    env_aliases: [SUPABASE_API_KEY]
